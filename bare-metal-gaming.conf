[main]
summary=Standalone Low Latency Gaming Profile (Distro-Agnostic)

[cpu]
# --- CPU STRATEGY ---
enabled=1
governor=performance
energy_perf_bias=performance
# SET TO 0 FOR DESKTOPS: 1 disables Turbo for laptops; 0 allows full boost.
no_turbo=1
# Forces the CPU to stay in a high-readiness state.
force_latency=1
# Energy Performance Preference: 'performance' ensures the hardware doesn't downclock.
energy_performance_preference=performance

[disk]
# --- STORAGE: NVME OPTIMIZATION ---
devices=nvme*
scheduler=none
readahead=128

[sysfs]
# --- CPU: P-STATE CEILING & FLOOR ---
/sys/devices/system/cpu/intel_pstate/min_perf_pct=95
/sys/devices/system/cpu/intel_pstate/max_perf_pct=100

# --- MEM: STUTTER REDUCTION ---
/sys/kernel/mm/transparent_hugepage/enabled=never
/sys/kernel/mm/transparent_hugepage/defrag=never

# --- KERNEL: ADDITIONAL LATENCY TWEAKS (From latency-performance) ---
# Sets the CPU to the highest performance bias.
/sys/devices/system/cpu/cpu*/power/pm_qos_resume_latency_us=0
# Disables CPU quiet/sleep features that cause wake-up lag.
/sys/module/pcie_aspm/parameters/policy=performance

